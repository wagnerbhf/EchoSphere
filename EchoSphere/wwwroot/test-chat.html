<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>EchoSphere - Teste Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom styles (kept for small overrides) -->
    <link rel="stylesheet" href="css/test-chat.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
</head>
<body>
    <div class="d-flex align-items-center justify-content-center min-vh-100 py-5">
        <div class="app-container bg-white rounded-4 shadow-lg p-4 mx-auto" style="max-width:1100px;">
            <div class="d-flex align-items-center mb-4">
                <div class="me-3">
                    <span class="badge rounded-circle bg-success" style="width:12px;height:12px;display:inline-block;"></span>
                </div>
                <div>
                    <h4 class="mb-0">EchoSphere — Teste de Chat</h4>
                    <small class="text-muted">Connect with JWT token, join rooms and send private messages.</small>
                </div>
            </div>



            <div class="row g-4">
                <!-- First row: login area | clear/user area | room area -->
                <div class="col-12">
                    <div class="d-flex flex-wrap align-items-start gap-3 first-row">
                        <div class="card border-0 shadow-sm p-2 first-col">
                            <div class="card-body p-3">
                                <h6 class="card-title">Quick auth (test)</h6>
                                <div class="d-flex gap-2 align-items-center">
                                    <input id="usernameInput" class="form-control" type="text" placeholder="Type a name (e.g. João)" />
                                    <button class="btn btn-outline-primary" onclick="login()" id="loginBtn">Login</button>
                                </div>
                                <div class="text-muted small mt-2">Token is handled automatically (not displayed).</div>
                            </div>
                        </div>

                        <div class="card border-0 shadow-sm p-2 second-col">
                            <div class="card-body p-3 d-flex flex-column gap-2 align-items-start">
                                <h6 class="card-title">User</h6>
                                <div class="badge bg-light text-dark">- <span id="userIdDisplay">-</span></div>
                                <div class="form-check">
                                    <input id="rememberToken" class="form-check-input" type="checkbox" />
                                    <label class="form-check-label small">Remember token</label>
                                </div>
                                <button class="btn btn-sm btn-link" onclick="clearSavedToken()">Clear saved</button>
                            </div>
                        </div>
                        <div class="card border-0 shadow-sm p-2 third-col">
                            <div class="card-body p-3 d-flex flex-column gap-2">
                                <h6 class="card-title">Room</h6>
                                <div class="d-flex align-items-center gap-2">
                                    <select id="roomSelect" class="form-select form-select-sm" style="flex: 0 0 140px; min-width:140px;">
                                        <option value="sala-geral">Sala Geral</option>
                                        <option value="namoro">Namoro</option>
                                        <option value="amizade">Amizade</option>
                                        <option value="estudo">Estudo</option>
                                        <option value="trabalho">Trabalho</option>
                                        <option value="hobbies">Hobbies</option>
                                        <option value="esportes">Esportes</option>
                                        <option value="musica">Música</option>
                                    </select>
                                    <button class="btn btn-sm btn-secondary" onclick="joinRoom()" id="joinRoomTop">Join</button>
                                </div>
                                <div id="roomControls" class="d-none mt-2">
                                    <label class="form-label">Room message</label>
                                    <div class="input-group">
                                        <input id="roomMessageInput" type="text" class="form-control" placeholder="Type a message for the room" />
                                        <button class="btn btn-primary" onclick="sendMessage()" id="sendRoomBtn">Send</button>
                                    </div>
                                </div>

                                <div id="chatControls" class="d-none mt-2">
                                    <label class="form-label">Private message</label>
                                    <div class="input-group">
                                        <input id="toUserIdInput" type="text" class="form-control" placeholder="recipient username" />
                                        <input id="privateMessageInput" type="text" class="form-control" placeholder="Type a private message" />
                                        <button class="btn btn-outline-primary" onclick="sendPrivateMessage()" id="sendPrivateBtn">Send</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Second row: full-width activity log -->
                <div class="col-12">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body">
                            <h6 class="card-title">Activity log</h6>
                            <div id="log" class="border rounded p-2" style="height:520px;overflow:auto;background:#fff"></div>
                            <div class="small text-muted mt-2">Current room: <span id="currentRoom">-</span></div>
                        </div>
                    </div>
                    <div class="text-muted small mt-2">Open this page as: <code>https://localhost:7147/test-chat.html</code></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/test-chat.js" defer></script>
</body>
</html>
